name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends shellcheck
      - name: Lint scripts
        run: shellcheck install.sh uninstall.sh diagnose.sh

  syntax-check:
    name: bash -n (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - debian:bookworm-slim
          - debian:trixie-slim
          - ubuntu:22.04
          - ubuntu:24.04
    steps:
      - uses: actions/checkout@v4
      - name: bash -n inside ${{ matrix.image }}
        run: |
          docker run --rm -v "$PWD:/work" -w /work "${{ matrix.image }}" \
            bash -c '
              set -e
              for f in install.sh uninstall.sh diagnose.sh; do
                echo "== $f =="
                bash -n "$f"
              done
            '

  dkms-precheck:
    name: DKMS availability (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - debian:bookworm-slim
          - debian:trixie-slim
          - ubuntu:22.04
          - ubuntu:24.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify dkms + git installable in ${{ matrix.image }}
        run: |
          docker run --rm "${{ matrix.image }}" bash -c '
            set -e
            apt-get update -qq
            apt-get install -y --no-install-recommends dkms git >/dev/null
            dkms --version
            git --version
          '
